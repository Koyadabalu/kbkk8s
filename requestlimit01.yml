---
apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod
  labels:
    app: proxy
    author: Balu
spec:
  containers:
    - name: mynginx
      image: nginx
      ports:
        - containerPort: 80
          hostPort: 9999
      resources:
        requests:
          cpu: 100m
          memory: 64M
        limits:
          cpu: 150m
          memory: 120M

...

