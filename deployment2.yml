---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deployment
  labels:
    app: db
    author: Balu
spec:
  replicas: 2
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      name:
      labels:
        app: db
    spec:
      containers:
        - name: mydb
          image: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: intelliqit
...

