  name: nginx-pod
  labels:
    app: proxy
    author: Balu
spec:
  containers:
    - name: mynginx
      image: nginx
      ports:
        - containerPort: 80
          hostPort: 9999
      resources:
        requests:
          cpu: 100m
          memory: 64M
        limits:
          cpu: 200m
          memory: 128M

      resources:
        requests:
          cpu: 100m
          memory: 64m
        limits:
          cpu: 200m
          memory: 128m

      resources:
        requests:
          cpu: 100m
          memory: 64m
        limits:
          cpu: 200m
          memory: 128m
...


